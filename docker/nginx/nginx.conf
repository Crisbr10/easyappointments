# nginx interno de Easy!Appointments
# Actua como adaptador HTTP<->FastCGI entre nginx_proxy_manager (host) y
# php-fpm:9000. Solo escucha en la red easyappointments_public, no expone
# puertos al host.
server {
    listen 80;
    server_name appointments.clinicadentaloctavio.com _;

    # Tamano maximo de upload. Lo mismo que el php-ini-overrides.ini
    # (post_max_size = 100M) + margen para multipart headers.
    client_max_body_size 128M;

    # Logs a stdout/stderr para que `docker logs` los capture.
    access_log /var/log/nginx/application.access.log;
    error_log  /var/log/nginx/application.error.log warn;

    root /var/www/html;
    index index.php index.html;

    # Easy!Appointments: front controller (CodeIgniter).
    # Todas las requests pasan por index.php, salvo assets que existan.
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # Handler FastCGI para PHP.
    location ~ ^.+.php {
        fastcgi_pass php-fpm:9000;
        fastcgi_split_path_info ^(.+?.php)(/.*)$;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PHP_VALUE "error_log=/var/log/nginx/application_php_errors.log";
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_index index.php;
        include fastcgi_params;
    }

    # Bloquear acceso a archivos .htaccess / .htpasswd por si quedan en el repo.
    location ~ /\.ht {
        deny all;
    }
}
