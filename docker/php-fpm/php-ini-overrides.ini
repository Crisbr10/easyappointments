; =============================================================================
; Easy!Appointments - PHP overrides para PRODUCCION
; =============================================================================
; Este archivo se monta en /usr/local/etc/php/conf.d/99-overrides.ini
; dentro del contenedor php-fpm. Cualquier cambio se aplica reiniciando
; el contenedor (php-fpm recarga al reiniciar).
; =============================================================================

; Limites de upload: 100M para avatars, attachments, etc.
upload_max_filesize = 100M
post_max_size       = 100M
memory_limit        = 256M
max_execution_time  = 60
max_input_time      = 60

; Sesiones: usar /storage/sessions dentro del contenedor (mas persistente
; que /tmp si el contenedor se rebuildea).
session.save_path = /var/www/html/storage/sessions
session.gc_maxlifetime = 604800

; =============================================================================
; XDebug DESACTIVADO en produccion
; =============================================================================
; xdebug agrega overhead (~30% slowdown) y expone informacion sensible
; (stack traces) si esta mal configurado. Mantenerlo apagado.
; Si necesitas debuggear, conectate al contenedor y hace:
;   docker exec -it easyappointments_php bash
;   export XDEBUG_MODE=debug
;   # modificar temporalmente y reiniciar php-fpm
; =============================================================================
xdebug.mode = off
xdebug.start_with_request = no

; =============================================================================
; Errores y logging
; =============================================================================
; En produccion: errores van a /var/log/nginx/application_php_errors.log
; y a /var/www/html/storage/logs/ (log_path de CodeIgniter).
; El cliente NO ve los errores (APP_ENV=production y display_errors=Off).
display_errors    = Off
display_startup_errors = Off
log_errors        = On
error_log         = /var/www/html/storage/logs/php_errors.log

; Nivel de error_reporting: silenciar deprecation notices (ruido puro).
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT & ~E_NOTICE

; =============================================================================
; OPcache (performance)
; =============================================================================
; Activar OPcache reduce 50-70% el tiempo de respuesta en PHP 8.x.
opcache.enable              = 1
opcache.enable_cli          = 0
opcache.memory_consumption  = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.validate_timestamps  = 1
opcache.revalidate_freq      = 2
opcache.fast_shutdown        = 1

; =============================================================================
; Timezone
; =============================================================================
; Ajustar segun tu zona. Argentina: America/Argentina/Buenos_Aires
date.timezone = America/Argentina/Buenos_Aires
